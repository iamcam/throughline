services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: podcast_engine
      POSTGRES_USER:  ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d podcast_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: